<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page non trouvée — WooPlans</title>
<meta name="description" content="La page que vous recherchez n'existe pas.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --brun: #1a1208;
  --terre: #8B5E3C;
  --or: #D4A853;
  --creme: #FAF7F2;
  --gris: #7A736C;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--creme);
  color: var(--brun);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px;
  text-align: center;
}
.error-code {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(6rem, 15vw, 10rem);
  font-weight: 400;
  color: var(--or);
  line-height: 1;
  margin-bottom: 8px;
}
.error-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(1.5rem, 4vw, 2rem);
  font-weight: 500;
  color: var(--brun);
  margin-bottom: 16px;
}
.error-desc {
  font-size: 1rem;
  color: var(--gris);
  max-width: 400px;
  margin-bottom: 32px;
  line-height: 1.6;
}
.btn-home {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: var(--brun);
  color: var(--or);
  font-size: .9rem;
  font-weight: 600;
  letter-spacing: .06em;
  padding: 16px 32px;
  border: none;
  border-radius: 4px;
  text-decoration: none;
  cursor: pointer;
  transition: transform .2s, box-shadow .2s;
}
.btn-home:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(26,18,8,.15);
}
.btn-home svg {
  width: 16px;
  height: 16px;
}
.nav-logo {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.5rem;
  font-weight: 600;
  color: var(--brun);
  text-decoration: none;
  position: absolute;
  top: 24px;
  left: 24px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.nav-dot {
  width: 9px;
  height: 9px;
  border-radius: 50%;
  background: var(--or);
}
@media (max-width: 480px) {
  .nav-logo { left: 16px; top: 16px; }
}
</style>
</head>
<body>

<a href="/" class="nav-logo"><span class="nav-dot"></span>WooPlans</a>

<div class="error-code">404</div>
<h1 class="error-title">Page introuvable</h1>
<p class="error-desc">La page que vous recherchez semble avoir été déplacée ou n'existe plus.</p>

<a href="/" class="btn-home">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
    <polyline points="9 22 9 12 15 12 15 22"/>
  </svg>
  Retour à l'accueil
</a>

</body>
</html>
